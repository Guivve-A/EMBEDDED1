; ============================================================================
; EMBEBIDOS_1 - Firmware ESP32-CAM v2.0.0 (camara cliente del sistema)
; ============================================================================
;
; Ing 2 / Parte 2 — rol definitivo tras el pivote v2:
;   - Board AI-Thinker ESP32-CAM (esp32cam), shield ESP32-CAM-MB para USB.
;   - Trigger por GPIO desde el UNO Q; captura OV2640; HTTPS POST /verify
;     (X-API-Key) al servidor Oracle Cloud; pulso de resultado por GPIO;
;     heartbeat cada 15 s.
;   - PSRAM habilitada (captura JPEG SVGA + buffer multipart en PSRAM).
;   - Particion huge_app.csv: 3 MB app (TLS + AsyncWebServer ocupan flash).
;
; lib_deps:
;   - esp32async/ESPAsyncWebServer + AsyncTCP: portal AP de configuracion
;     WiFi (fork esp32async, compatible con arduino-esp32 core 2.x y 3.x).
;   - bblanchon/ArduinoJson v7: parseo de /verify y armado del heartbeat.
;   - esp32-camera, WiFiClientSecure y HTTPClient vienen en el core.
; ============================================================================

[platformio]
default_envs = esp32cam

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino

monitor_speed = 115200
upload_speed = 460800

board_build.partitions = huge_app.csv

build_flags =
    -D PROJECT_NAME=\"EMBEBIDOS_1_ESP32CAM\"
    -D FW_VERSION=\"2.0.0\"
    -D BOARD_HAS_PSRAM
    -D CORE_DEBUG_LEVEL=2
    -mfix-esp32-psram-cache-issue

lib_deps =
    esp32async/ESPAsyncWebServer @ ^3.6.0
    esp32async/AsyncTCP @ ^3.3.2
    bblanchon/ArduinoJson @ ^7.2.0
