; ============================================================================
; EMBEBIDOS_1 - Firmware "face_security"  (Arduino UNO Q)
; Ing 2 - FASE 1: setup PlatformIO + bring-up (blink + Serial @115200)
; ----------------------------------------------------------------------------
;  Raiz del proyecto PlatformIO = Code_platform_io_arduinoq/ (estructura plana:
;  platformio.ini + src/ + include/ + lib/). PLAN_FASES.md dibujaba una
;  subcarpeta face_security/, pero la aplanamos por practicidad y consistencia
;  con el bring-up del Dia 1 (Ing 2). Documentado en works.md.
; ============================================================================
;
; -------------------------------------------------------------------------
;  HALLAZGO REAL DEL BOARD "Arduino UNO Q"  (investigado en Fase 1, jun-2026)
; -------------------------------------------------------------------------
;  El "Arduino UNO Q" (lanzado oct-2025) es una placa HIBRIDA de doble cerebro:
;    - MPU  : Qualcomm Dragonwing QRB2210 (quad Cortex-A53) corriendo
;             Debian Linux  ->  aqui vive "Arduino App Lab".
;    - MCU  : ST STM32U585AII6TR (Cortex-M33 @160 MHz, 2 MB flash, 786 KB SRAM)
;             ->  aqui corre el sketch Arduino, sobre Zephyr OS.
;
;  Estado de soporte en PlatformIO (verificado en el registry y en la
;  comunidad oficial, jun-2026):
;    * NO existe board definition oficial `uno_q` / `arduino_uno_q` en el
;      indice de PlatformIO (`pio boards uno_q` no devuelve nada).
;    * NO existe board.json comunitario maduro para la parte STM32U585 de
;      esta placa concreta.
;    * El core que usa Arduino para el STM32U585 NO es STM32Duino: es un core
;      basado en *Zephyr + llext* mantenido por Arduino:
;          https://github.com/arduino/ArduinoCore-zephyr   (FQBN arduino:zephyr:unoq)
;      El sketch se compila a un ELF que un "loader" Zephyr precompilado carga
;      dinamicamente (no es un binario monolitico clasico). Toolchain Zephyr.
;    * El UPLOAD es el bloqueante principal: el flasher es un "remoteocd" que
;      necesita el lado Linux (Qualcomm) corriendo y sube el binario por red.
;      PlatformIO hoy NO sabe orquestar ese uploader.
;    * Issues oficiales que rastrean el soporte (lectura recomendada al PM):
;        - platformio/platform-ststm32  #869  (parte STM32U585)
;            https://github.com/platformio/platform-ststm32/issues/869
;        - PlatformIO Community  "Support for UNO Q"  (hilo 52900)
;            https://community.platformio.org/t/support-for-uno-q/52900
;
;  CONCLUSION DE INGENIERIA (Ing 2):
;    Para el UNO Q el camino de compilacion+flasheo SOPORTADO HOY es
;    **Arduino App Lab v0.8.0** (ya instalado por el usuario), que trae el core
;    Zephyr y el remoteocd. PlatformIO se usa aqui como entorno de EDICION y de
;    VALIDACION DE COMPILACION del codigo portable (env `uno`).
;
; -------------------------------------------------------------------------
;  ESTRATEGIA DE ENTORNOS (envs)
; -------------------------------------------------------------------------
;  [env:uno]  (POR DEFECTO) -> ATmega328P. Es un FALLBACK de compilacion.
;      Permite que `pio run` valide que el codigo C/C++ de F1-F2 compila sin
;      errores mientras no haya board UNO Q en PlatformIO. El firmware de
;      F1-F2 solo usa GPIO/ADC/Serial estandar, asi que es 100% portable a AVR.
;      (OJO: WiFi/AP + camara OV7670 de F3-F5 NO caben en AVR; ese codigo se
;       compilara realmente con App Lab sobre el STM32U585. Ver nota abajo.)
;
;  [env:uno_r4_wifi] / [env:uno_r4_minima] -> Renesas RA4M1. Se dejan como
;      alternativa "UNO moderno con WiFi" por si el PM decide pivotar a un
;      UNO R4 real (que SI tiene soporte PlatformIO nativo y WiFi). No es el
;      UNO Q, pero es la opcion con WiFi mas cercana 100% soportada por PIO.
;      Requiere descargar la plataforma:  pio pkg install -g -p renesas-ra
;
;  [env:genericSTM32U585] -> (COMENTADO/REFERENCIA) el MCU del UNO Q es un
;      STM32U585; este env usaria el core STM32Duino, NO el core Zephyr de
;      Arduino. Compilaria a nivel de CPU pero el pinmap y el uploader NO
;      corresponden al UNO Q. Se deja documentado para futura migracion si
;      PlatformIO publica el board oficial.
;
; -------------------------------------------------------------------------
;  COMANDOS UTILES  (rutas Windows; pio.exe no esta en PATH en este equipo:
;  C:\Users\ADMIN\.platformio\penv\Scripts\pio.exe)
; -------------------------------------------------------------------------
;    Compilar (validacion portable):   pio run -e uno
;    Compilar UNO R4 WiFi:             pio run -e uno_r4_wifi
;    Subir (env de validacion AVR):    pio run -e uno -t upload
;    Monitor serie:                    pio device monitor -b 115200
;    (UNO Q real) compilar+flashear:   usar Arduino App Lab v0.8.0, o
;                                      arduino-cli con el core arduino:zephyr y
;                                      el FQBN arduino:zephyr:unoq (ver README/
;                                      works.md). El upload necesita el lado
;                                      Linux del UNO Q activo.
; ============================================================================

[platformio]
default_envs = uno

; ---- Configuracion comun a todos los entornos --------------------------
[env]
framework = arduino
monitor_speed = 115200          ; F1 exige 115200 baud
lib_deps =                      ; vacio en F1 (ArduinoJson, etc. llegan en F4/F5)
build_flags =
    -D PROJECT_NAME=\"EMBEBIDOS_1_FACE_SECURITY\"
    -D FW_VERSION=\"0.3.0-f2\"

; ---- [env:uno] ATmega328P : FALLBACK de compilacion (por defecto) ------
; El UNO Q no existe en PlatformIO; este env valida que el C/C++ compila.
[env:uno]
platform = atmelavr
board = uno
; upload_port: en Windows suele ser COMx (p.ej. COM3). Autodetectado por PIO.
; Forzar manualmente si hay varios puertos:
; upload_port = COM3
; monitor_port = COM3

; ---- [env:uno_r4_wifi] Renesas RA4M1 : alternativa con WiFi nativo -----
[env:uno_r4_wifi]
platform = renesas-ra
board = uno_r4_wifi
; upload_port = COM3      ; ajustar al puerto real del UNO R4

; ---- [env:uno_r4_minima] Renesas RA4M1 (sin WiFi) ----------------------
[env:uno_r4_minima]
platform = renesas-ra
board = uno_r4_minima
; upload_port = COM3

; ---- [env:genericSTM32U585] REFERENCIA (core STM32Duino, NO Zephyr) ----
; Descomentar solo para experimentar con el MCU a nivel CPU. NO es el UNO Q:
; el pinmap real del UNO Q y su uploader remoteocd NO estan aqui.
; [env:genericSTM32U585]
; platform = ststm32
; board = genericSTM32U585AI
; upload_protocol = stlink
