<!DOCTYPE html>
<!--
  index.html  -  EMBEBIDOS_1 / Fase 4  -  Portal de configuracion WiFi
  Ing 2 (firmware embedded)

  Servido por el brick web_ui (lado Linux del UNO Q) en :7000.
  En modo AP (FaceSecurity_Setup) la URL es http://10.42.0.1:7000

  CSS y JS van EN LINEA a proposito: en modo AP no hay internet, asi que el
  portal no puede depender de CDNs (Tailwind, fuentes remotas, etc.).
  Paleta Apple Black/Gold del proyecto: negro absoluto + oro #D4AF37, sin emojis.
-->
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>FaceSecurity — Configuracion WiFi</title>
<style>
  :root { --gold:#D4AF37; --gold-dim:#9c7f28; --bg:#000; --card:#0c0c0c; --line:#1f1f1f; --txt:#f5f5f5; --muted:#8a8a8a; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--txt);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased; }
  .wrap { max-width:480px; margin:0 auto; padding:32px 20px 56px; }
  .brand { letter-spacing:.32em; font-size:12px; color:var(--gold); text-transform:uppercase; margin-bottom:6px; }
  h1 { font-size:26px; font-weight:600; margin:0 0 4px; }
  .sub { color:var(--muted); font-size:14px; margin:0 0 28px; line-height:1.5; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px 20px; margin-bottom:18px; }
  .card h2 { font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin:0 0 16px; }
  label { display:block; font-size:13px; color:var(--muted); margin:14px 0 6px; }
  input { width:100%; padding:15px 14px; font-size:16px; color:var(--txt);
    background:#000; border:1px solid var(--line); border-radius:11px; outline:none; }
  input:focus { border-color:var(--gold); }
  .hint { font-size:12px; color:#5c5c5c; margin-top:6px; }
  button { width:100%; padding:16px; font-size:16px; font-weight:600; border:none; border-radius:12px; cursor:pointer; margin-top:8px; }
  .primary { background:var(--gold); color:#000; }
  .primary:active { background:var(--gold-dim); }
  .ghost { background:transparent; color:var(--muted); border:1px solid var(--line); margin-top:14px; }
  .status { display:flex; align-items:center; gap:10px; font-size:14px; color:var(--muted); margin-bottom:22px; }
  .dot { width:9px; height:9px; border-radius:50%; background:#555; flex:0 0 auto; }
  .dot.ap { background:var(--gold); } .dot.client { background:#34c759; } .dot.err { background:#ff453a; }
  .msg { margin-top:16px; font-size:14px; line-height:1.5; min-height:20px; }
  .msg.ok { color:#34c759; } .msg.err { color:#ff453a; } .msg.info { color:var(--gold); }
  .foot { color:#444; font-size:11px; text-align:center; margin-top:30px; letter-spacing:.04em; }
  .row2 { display:grid; grid-template-columns:1fr; gap:0; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">EMBEBIDOS_1</div>
    <h1>FaceSecurity</h1>
    <p class="sub">Configuracion inicial de red. Ingresa hasta dos redes WiFi: el dispositivo usara la primaria y, si falla, la de respaldo.</p>

    <div class="status">
      <span id="dot" class="dot"></span>
      <span id="statusText">Consultando estado...</span>
    </div>

    <form id="form" autocomplete="off">
      <div class="card">
        <h2>Red primaria</h2>
        <label for="ssid1">Nombre de red (SSID)</label>
        <input id="ssid1" name="ssid1" type="text" placeholder="MiRedWiFi" required maxlength="32" />
        <label for="pass1">Contrasena</label>
        <input id="pass1" name="pass1" type="password" placeholder="********" maxlength="63" />
        <div class="hint">Dejala vacia solo si la red es abierta.</div>
      </div>

      <div class="card">
        <h2>Red de respaldo <span style="color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></h2>
        <label for="ssid2">Nombre de red (SSID)</label>
        <input id="ssid2" name="ssid2" type="text" placeholder="MiRedWiFi_Backup" maxlength="32" />
        <label for="pass2">Contrasena</label>
        <input id="pass2" name="pass2" type="password" placeholder="********" maxlength="63" />
      </div>

      <button type="submit" class="primary" id="saveBtn">Guardar y conectar</button>
      <button type="button" class="ghost" id="resetBtn">Restablecer (volver a modo AP)</button>
      <div id="msg" class="msg"></div>
    </form>

    <div class="foot">UNO Q · Fase 4 · Portal de configuracion</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
