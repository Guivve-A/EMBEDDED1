# ===========================================================================
# nginx.conf — server block (reverse proxy) para EMBEBIDOS_1 Face Server
# ---------------------------------------------------------------------------
# Instalar:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/embebidos
#   sudo ln -s /etc/nginx/sites-available/embebidos /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default     # opcional: quita el default
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS lo añade certbot automáticamente (ver README_DEPLOY.md):
#   sudo certbot --nginx -d <tu-subdominio>.duckdns.org
# certbot reescribe este archivo: añade el listen 443 ssl, las rutas de los
# certificados y un redirect 80 -> 443. NO edites a mano la parte SSL.
# ===========================================================================

server {
    listen 80;
    listen [::]:80;

    # CAMBIA por tu dominio DuckDNS (sin http://, sin barra final).
    server_name TU_SUBDOMINIO.duckdns.org;

    # Las fotos JPEG del UNO Q viajan por multipart en POST /verify y /enroll.
    # QVGA/VGA pesa pocos KB, pero damos holgura para fotos de enrolamiento.
    client_max_body_size 20M;

    # Timeouts holgados: la 1ª inferencia de DeepFace puede tardar si el warmup
    # aún no terminó al recibir el primer /verify.
    proxy_connect_timeout 60s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    location / {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Soporte de upgrade (no se usa WebSocket hoy, pero queda listo).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
